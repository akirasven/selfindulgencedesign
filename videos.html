<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Indulgence Design — Videos</title>
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="shortcut icon" href="favicon.ico">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#ffffff;
    color:#6e1414;
    font-family: "Times New Roman", Times, Georgia, serif;
    cursor: url('cursor-star.png') 16 16, auto;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }

  .site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 0 0;
    background:#ffffff;
    z-index:10;
    border-bottom:1px solid #eee2e2;
  }

  .site-header canvas{
    height:56px;
    width:auto;
    display:block;
  }

  @media (min-width: 768px){
    .site-header canvas{
      height:110px;
    }
  }

  .logo-link{
    display:block;
    line-height:0;
    text-decoration:none;
  }

  .visually-hidden-video{
    position:absolute;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
  }

  .site-nav{
    width:100%;
    max-width:520px;
    display:flex;
    justify-content:space-evenly;
    padding:10px 24px;
  }

  .site-nav a{
    color:#6e1414;
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:15px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    transition:opacity 0.3s ease;
  }

  .site-nav a:hover,
  .site-nav a:focus-visible{
    opacity:0.6;
  }

  main{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 24px 100px;
  }

  .video-list{
    width:100%;
    max-width:720px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:100px;
  }

  .video-block{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .video-title{
    font-size:clamp(18px, 3vw, 24px);
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#6e1414;
  }

  .video-year{
    margin-top:6px;
    font-size:13px;
    letter-spacing:0.16em;
    color:#9a8080;
  }

  .yt-frame{
    margin-top:22px;
    width:100%;
    aspect-ratio:16/9;
  }

  .yt-frame iframe{
    width:100%;
    height:100%;
    border:0;
  }

  .video-placeholder{
    margin-top:22px;
    width:100%;
    aspect-ratio:16/9;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:repeating-linear-gradient(115deg, #f7f0f0 0 2px, #efe4e4 2px 4px);
    border:1px solid #eee2e2;
  }

  .video-placeholder span{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#9a8080;
    max-width:240px;
    line-height:1.6;
  }
</style>
</head>
<body>
  <header class="site-header" id="siteHeader">
    <video id="logoVideo" class="visually-hidden-video" muted loop autoplay playsinline>
      <source src="header-logo-chroma.mp4" type="video/mp4">
    </video>
    <a href="site.html" class="logo-link" aria-label="Return to home page">
      <canvas id="logoCanvas" width="162" height="120"></canvas>
    </a>
    <nav class="site-nav">
      <a href="models.html">Models</a>
      <a href="videos.html">Videos</a>
      <a href="archive.html">Archive</a>
      <a href="order.html">Order</a>
    </nav>
  </header>

  <main>
    <div class="video-list" id="videoList"></div>
  </main>

  <script>
    /*
      VIDEOS
      ----------------------------------------------------
      Add or reorder entries here. Each needs a title, a year, and a
      YouTube video ID (the part after "v=" or after "youtu.be/" in a
      YouTube link). Leave videoId as null to show a placeholder instead.
    */
    var VIDEOS = [
      { title: "Pretty On The Inside", year: "2025", videoId: "IZ3QvrsQHTo" },
      { title: "PunkStyleLove", year: "2026", videoId: "n1Lzcj-j9qo" }
    ];

    (function(){
      var list = document.getElementById('videoList');

      VIDEOS.forEach(function(video){
        var block = document.createElement('div');
        block.className = 'video-block';

        var title = document.createElement('div');
        title.className = 'video-title';
        title.textContent = video.title;

        var year = document.createElement('div');
        year.className = 'video-year';
        year.textContent = video.year;

        block.appendChild(title);
        block.appendChild(year);

        if (video.videoId){
          var frame = document.createElement('div');
          frame.className = 'yt-frame';
          frame.innerHTML =
            '<iframe src="https://www.youtube-nocookie.com/embed/' + video.videoId +
            '" title="' + video.title + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
          block.appendChild(frame);
        } else {
          var placeholder = document.createElement('div');
          placeholder.className = 'video-placeholder';
          placeholder.innerHTML = '<span>Add a YouTube video ID to fill this in</span>';
          block.appendChild(placeholder);
        }

        list.appendChild(block);
      });
    })();
  </script>
  <script>
    (function(){
      var header = document.getElementById('siteHeader');
      var main = document.querySelector('main');

      function adjustSpacing(){
        main.style.paddingTop = (header.offsetHeight + 24) + 'px';
      }

      adjustSpacing();
      window.addEventListener('resize', adjustSpacing);
      window.addEventListener('load', adjustSpacing);
      setTimeout(adjustSpacing, 300); // re-measure once fonts/logo finish rendering
    })();
  </script>
  <script>
    (function(){
      var video = document.getElementById('logoVideo');
      var canvas = document.getElementById('logoCanvas');
      var ctx = canvas.getContext('2d', { willReadFrequently: true });

      function drawFrame(){
        if (!video.paused && !video.ended){
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var data = frame.data;
          for (var i = 0; i < data.length; i += 4){
            var r = data[i], g = data[i+1], b = data[i+2];
            if (g > 85 && g > r * 1.3 && g > b * 1.3){
              data[i+3] = 0;
            }
          }
          ctx.putImageData(frame, 0, 0);
        }
        requestAnimationFrame(drawFrame);
      }

      video.play().catch(function(){});
      requestAnimationFrame(drawFrame);
    })();
  </script>
</body>
</html>
