<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Indulgence Design — Videos</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#ffffff;
    color:#6e1414;
    font-family: "Times New Roman", Times, Georgia, serif;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }

  .site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 0 0;
    background:#ffffff;
    z-index:10;
    border-bottom:1px solid #eee2e2;
  }

  .site-header video{
    height:56px;
    width:auto;
    display:block;
  }

  .site-nav{
    width:100%;
    max-width:520px;
    display:flex;
    justify-content:space-evenly;
    padding:10px 24px;
  }

  .site-nav a{
    color:#6e1414;
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:15px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    transition:opacity 0.3s ease;
  }

  .site-nav a:hover,
  .site-nav a:focus-visible{
    opacity:0.6;
  }

  main{
    flex:1;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:150px 24px 24px;
  }

  p{
    font-size:14px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:#6e1414;
  }
</style>
</head>
<body>
  <header class="site-header">
    <video autoplay muted loop playsinline>
      <source src="header-logo.webm" type="video/webm">
      <source src="header-logo-safari.mov" type="video/quicktime">
    </video>
    <nav class="site-nav">
      <a href="models.html">Models</a>
      <a href="videos.html">Videos</a>
      <a href="archive.html">Archive</a>
    </nav>
  </header>

  <main>
    <p>Coming Soon</p>
  </main>
</body>
</html>
