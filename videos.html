<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Indulgence Design — Videos</title>
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="shortcut icon" href="favicon.ico">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#ffffff;
    color:#6e1414;
    font-family: "Times New Roman", Times, Georgia, serif;
    cursor: url('cursor-star.png') 16 16, auto;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }

  .site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 0 0;
    background:#ffffff;
    z-index:10;
    border-bottom:1px solid #eee2e2;
  }

  .site-header canvas{
    height:56px;
    width:auto;
    display:block;
  }

  @media (min-width: 768px){
    .site-header canvas{
      height:110px;
    }
  }

  .logo-link{
    display:block;
    line-height:0;
    text-decoration:none;
  }

  .visually-hidden-video{
    position:absolute;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
  }

  .site-nav{
    width:100%;
    max-width:520px;
    display:flex;
    justify-content:space-evenly;
    padding:10px 24px;
  }

  .site-nav a{
    color:#6e1414;
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:15px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    transition:opacity 0.3s ease;
  }

  .site-nav a:hover,
  .site-nav a:focus-visible{
    opacity:0.6;
  }

  main{
    flex:1;
    width:100%;
  }

  /* ---- channel scroll track ---- */
  .channel-track{
    position:relative;
    width:100%;
  }

  .tv-sticky-wrap{
    position:sticky;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
  }

  .channel-marker{
    width:100%;
  }

  .scroll-hint{
    font-size:12px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:#9a8080;
  }

  /* ---- the TV itself ---- */
  .tv{
    position:relative;
    width:min(86vw, 480px);
  }

  .tv-body{
    position:relative;
    background:linear-gradient(155deg, #e2e3e5 0%, #c3c5c8 55%, #a9abae 100%);
    border-radius:10px;
    padding:22px 22px 0;
    box-shadow:
      0 20px 40px rgba(0,0,0,0.22),
      inset 0 1px 0 rgba(255,255,255,0.5);
  }

  .tv-channel-label{
    position:absolute;
    top:34px;
    left:34px;
    z-index:2;
    font-size:13px;
    letter-spacing:0.12em;
    color:#e8e4e0;
    background:rgba(0,0,0,0.4);
    padding:3px 8px;
    border-radius:3px;
  }

  .tv-screen{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:#333335;
    border-radius:4px;
    overflow:hidden;
    box-shadow:
      inset 0 0 0 2px #050505,
      inset 0 6px 14px rgba(0,0,0,0.5);
  }

  .tv-screen iframe{
    width:100%;
    height:100%;
    border:0;
  }

  .tv-screen .scanlines{
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.035) 0px,
      rgba(255,255,255,0.035) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
  }

  .tv-placeholder{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:repeating-linear-gradient(115deg, #3a3535 0 2px, #2a2626 2px 4px);
  }

  .tv-placeholder span{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#c9baba;
    max-width:220px;
    line-height:1.6;
  }

  /* ---- control strip below the screen ---- */
  .tv-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    padding:14px 12px;
  }

  .tv-controls .grille{
    flex:1;
    height:14px;
    background:repeating-linear-gradient(
      to right,
      #6d6f72 0px, #6d6f72 2px,
      #8c8e91 2px, #8c8e91 5px
    );
    border-radius:2px;
    opacity:0.9;
  }

  .tv-controls .led{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#8a1f1f;
    box-shadow:0 0 4px rgba(200,40,40,0.7);
    flex-shrink:0;
  }

  .tv-controls .knob{
    width:13px;
    height:13px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #f2f2f3, #8a8c8f 75%);
    flex-shrink:0;
    box-shadow:0 1px 2px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
  <header class="site-header" id="siteHeader">
    <video id="logoVideo" class="visually-hidden-video" muted loop autoplay playsinline>
      <source src="header-logo-chroma.mp4" type="video/mp4">
    </video>
    <a href="site.html" class="logo-link" aria-label="Return to home page">
      <canvas id="logoCanvas" width="162" height="120"></canvas>
    </a>
    <nav class="site-nav">
      <a href="models.html">Models</a>
      <a href="videos.html">Videos</a>
      <a href="archive.html">Archive</a>
      <a href="order.html">Order</a>
    </nav>
  </header>

  <main>
    <div class="channel-track" id="channelTrack">
      <div class="tv-sticky-wrap" id="tvStickyWrap">
        <div class="tv">
          <div class="tv-body">
            <div class="tv-channel-label" id="channelLabel">CH. 01</div>
            <div class="tv-screen" id="tvScreen"></div>
            <div class="tv-controls">
              <div class="grille"></div>
              <span class="led"></span>
              <span class="knob"></span>
              <span class="knob"></span>
            </div>
          </div>
        </div>
        <p class="scroll-hint">Scroll to change the channel</p>
      </div>

      <!-- invisible scroll markers, one per channel, drive which video shows in the TV above -->
      <div class="channel-marker" data-channel="0"></div>
      <div class="channel-marker" data-channel="1"></div>
      <div class="channel-marker" data-channel="2"></div>
      <div class="channel-marker" data-channel="3"></div>
    </div>
  </main>

  <script>
    /*
      CHANNELS
      ----------------------------------------------------
      Replace videoId with a real YouTube video ID once you have one
      (the part after "v=" or after "youtu.be/" in a YouTube URL).
      Example: videoId: "IZ3QvrsQHTo"
      Leave as null to keep showing the placeholder screen.
    */
    var CHANNELS = [
      { label: "CH. 01", videoId: "IZ3QvrsQHTo" },
      { label: "CH. 02", videoId: "n1Lzcj-j9qo" },
      { label: "CH. 03", videoId: null },
      { label: "CH. 04", videoId: null }
    ];

    (function(){
      var header = document.getElementById('siteHeader');
      var track = document.getElementById('channelTrack');
      var stickyWrap = document.getElementById('tvStickyWrap');
      var screen = document.getElementById('tvScreen');
      var channelLabel = document.getElementById('channelLabel');
      var markers = document.querySelectorAll('.channel-marker');

      var currentIndex = -1;

      function renderChannel(index){
        if (index === currentIndex) return;
        currentIndex = index;
        var channel = CHANNELS[index];
        channelLabel.textContent = channel.label;

        if (channel.videoId){
          screen.innerHTML =
            '<iframe src="https://www.youtube-nocookie.com/embed/' + channel.videoId +
            '" title="' + channel.label + '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';
        } else {
          screen.innerHTML =
            '<div class="tv-placeholder"><span>' + channel.label + ' — add a YouTube video ID above to fill this channel</span></div>' +
            '<div class="scanlines"></div>';
        }
      }

      function layout(){
        var headerHeight = header.offsetHeight;
        var viewportHeight = window.innerHeight;
        var stickyHeight = viewportHeight - headerHeight;

        stickyWrap.style.top = headerHeight + 'px';
        stickyWrap.style.height = stickyHeight + 'px';

        markers.forEach(function(marker){
          marker.style.height = viewportHeight + 'px';
        });
      }

      function updateActiveChannel(){
        var trackTop = track.getBoundingClientRect().top + window.scrollY;
        var stickyHeight = stickyWrap.offsetHeight;
        var viewportHeight = window.innerHeight;

        var progress = window.scrollY - trackTop - stickyHeight;
        var index = Math.floor(progress / viewportHeight);
        index = Math.max(0, Math.min(CHANNELS.length - 1, index));
        renderChannel(index);
      }

      layout();
      renderChannel(0);

      window.addEventListener('resize', function(){
        layout();
        updateActiveChannel();
      });
      window.addEventListener('scroll', updateActiveChannel, { passive: true });
      setTimeout(layout, 300); // re-measure once fonts/logo finish rendering
    })();
  </script>
  <script>
    (function(){
      var video = document.getElementById('logoVideo');
      var canvas = document.getElementById('logoCanvas');
      var ctx = canvas.getContext('2d', { willReadFrequently: true });

      function drawFrame(){
        if (!video.paused && !video.ended){
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var data = frame.data;
          for (var i = 0; i < data.length; i += 4){
            var r = data[i], g = data[i+1], b = data[i+2];
            if (g > 85 && g > r * 1.3 && g > b * 1.3){
              data[i+3] = 0;
            }
          }
          ctx.putImageData(frame, 0, 0);
        }
        requestAnimationFrame(drawFrame);
      }

      video.play().catch(function(){});
      requestAnimationFrame(drawFrame);
    })();
  </script>
</body>
</html>
