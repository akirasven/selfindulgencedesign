<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Indulgence Design — Custom Order</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#ffffff;
    color:#6e1414;
    font-family: "Times New Roman", Times, Georgia, serif;
    cursor: url('cursor-star.png') 16 16, auto;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }

  .site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 0 0;
    background:#ffffff;
    z-index:10;
    border-bottom:1px solid #eee2e2;
  }

  .site-header canvas{
    height:56px;
    width:auto;
    display:block;
  }

  @media (min-width: 768px){
    .site-header canvas{
      height:110px;
    }
    main{
      padding-top:270px;
    }
  }

  .logo-link{
    display:block;
    line-height:0;
    text-decoration:none;
  }

  .visually-hidden-video{
    position:absolute;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
  }

  .site-nav{
    width:100%;
    max-width:520px;
    display:flex;
    justify-content:space-evenly;
    padding:10px 24px;
  }

  .site-nav a{
    color:#6e1414;
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:15px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    transition:opacity 0.3s ease;
  }

  .site-nav a:hover,
  .site-nav a:focus-visible{
    opacity:0.6;
  }

  main{
    flex:1;
    width:100%;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:210px 24px 60px;
  }

  .order-wrap{
    width:100%;
    max-width:480px;
    text-align:center;
  }

  h1{
    font-size:clamp(24px, 4vw, 34px);
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    line-height:1.2;
  }

  .order-wrap > p{
    margin-top:12px;
    font-size:14px;
    letter-spacing:0.1em;
    color:#9a8080;
  }

  form{
    margin-top:36px;
    display:flex;
    flex-direction:column;
    gap:20px;
    text-align:left;
  }

  label{
    display:flex;
    flex-direction:column;
    gap:6px;
    font-size:13px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#6e1414;
  }

  input, select, textarea{
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:16px;
    color:#111110;
    padding:10px 4px;
    border:none;
    border-bottom:1px solid #6e1414;
    background:transparent;
    outline:none;
  }

  input:focus, select:focus, textarea:focus{
    border-bottom-width:2px;
  }

  textarea{
    resize:vertical;
    min-height:100px;
  }

  .row{
    display:flex;
    gap:20px;
  }

  .row label{
    flex:1;
  }

  button{
    appearance:none;
    background:transparent;
    border:none;
    color:#6e1414;
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:18px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    padding:14px 0 6px;
    cursor:pointer;
    align-self:center;
    transition:opacity 0.3s ease;
  }

  button:hover,
  button:focus-visible{
    opacity:0.6;
  }

  @media (max-width: 480px){
    .row{
      flex-direction:column;
      gap:20px;
    }
  }
</style>
</head>
<body>

    </div>
  </main>

  <script>
    (function(){
      var video = document.getElementById('logoVideo');
      var canvas = document.getElementById('logoCanvas');
      var ctx = canvas.getContext('2d', { willReadFrequently: true });

      function drawFrame(){
        if (!video.paused && !video.ended){
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var data = frame.data;
          for (var i = 0; i < data.length; i += 4){
            var r = data[i], g = data[i+1], b = data[i+2];
            if (g > 85 && g > r * 1.3 && g > b * 1.3){
              data[i+3] = 0;
            }
          }
          ctx.putImageData(frame, 0, 0);
        }
        requestAnimationFrame(drawFrame);
      }

      video.play().catch(function(){});
      requestAnimationFrame(drawFrame);
    })();
  </script>
</body>
</html>
