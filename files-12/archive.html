<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Indulgence Design — Archive</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#ffffff;
    color:#6e1414;
    font-family: "Times New Roman", Times, Georgia, serif;
    cursor: url('cursor-star.png') 16 16, auto;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }

  .site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 0 0;
    background:#ffffff;
    z-index:10;
    border-bottom:1px solid #eee2e2;
  }

  .site-header canvas{
    height:56px;
    width:auto;
    display:block;
  }

  @media (min-width: 768px){
    .site-header canvas{
      height:110px;
    }
    main{
      padding-top:210px;
    }
  }

  .logo-link{
    display:block;
    line-height:0;
    text-decoration:none;
  }

  .visually-hidden-video{
    position:absolute;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
  }

  .site-nav{
    width:100%;
    max-width:520px;
    display:flex;
    justify-content:space-evenly;
    padding:10px 24px;
  }

  .site-nav a{
    color:#6e1414;
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:15px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    transition:opacity 0.3s ease;
  }

  .site-nav a:hover,
  .site-nav a:focus-visible{
    opacity:0.6;
  }

  main{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:150px 24px 24px;
  }

  @media (min-width: 768px){
    main{
      padding-left:24px;
      padding-right:24px;
    }
  }

  .gallery{
    width:100%;
    max-width:640px;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    padding-bottom:80px;
  }

  .gallery figure{
    width:100%;
    margin:0;
  }

  .gallery img{
    display:block;
    width:100%;
    height:auto;
    cursor:pointer;
  }

  .gallery .placeholder-photo{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:repeating-linear-gradient(115deg, #f7f0f0 0 2px, #efe4e4 2px 4px);
    border:1px solid #eee2e2;
  }

  .gallery .placeholder-photo span{
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:#9a8080;
    max-width:120px;
    line-height:1.5;
  }

  .aspect-tall{ aspect-ratio: 3/4; }
  .aspect-wide{ aspect-ratio: 4/3; }
  .aspect-square{ aspect-ratio: 1/1; }

  .gallery-sentinel{
    height:1px;
  }

  /* ---- back to top button ---- */
  .back-to-top{
    position:fixed;
    right:20px;
    bottom:20px;
    width:40px;
    height:40px;
    padding:0;
    border:none;
    background:transparent;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease;
    z-index:20;
  }

  .back-to-top svg{
    width:100%;
    height:100%;
    display:block;
  }

  .back-to-top.visible{
    opacity:1;
    pointer-events:auto;
  }

  .back-to-top:hover,
  .back-to-top:focus-visible{
    opacity:0.6;
  }

  /* ---- lightbox ---- */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(10,10,10,0.94);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
  }

  .lightbox[hidden]{
    display:none;
  }

  .lightbox img{
    max-width:88vw;
    max-height:82vh;
    display:block;
  }

  .lightbox-close,
  .lightbox-nav{
    position:fixed;
    appearance:none;
    background:transparent;
    border:none;
    color:#f5f0ee;
    cursor:pointer;
    font-family:"Times New Roman", Times, Georgia, serif;
    transition:opacity 0.3s ease;
  }

  .lightbox-close:hover,
  .lightbox-nav:hover{
    opacity:0.6;
  }

  .lightbox-close{
    top:20px;
    right:24px;
    font-size:32px;
  }

  .lightbox-nav{
    top:50%;
    transform:translateY(-50%);
    font-size:48px;
    padding:10px 16px;
  }

  .lightbox-prev{ left:8px; }
  .lightbox-next{ right:8px; }

  @media (max-width:480px){
    .lightbox-nav{ font-size:36px; padding:6px 10px; }
  }
</style>
</head>
<body>
  <header class="site-header">
    <video id="logoVideo" class="visually-hidden-video" muted loop autoplay playsinline>
      <source src="header-logo-chroma.mp4" type="video/mp4">
    </video>
    <a href="site.html" class="logo-link" aria-label="Return to home page">
      <canvas id="logoCanvas" width="162" height="120"></canvas>
    </a>
    <nav class="site-nav">
      <a href="models.html">Models</a>
      <a href="videos.html">Videos</a>
      <a href="archive.html">Archive</a>
      <a href="order.html">Order</a>
    </nav>
  </header>

  <main>
    <div class="gallery" id="gallery"></div>
    <div class="gallery-sentinel" id="gallerySentinel"></div>
  </main>

  <button id="backToTop" class="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50.00,8.00 40.57,37.02 10.06,37.02 34.74,54.96 25.31,83.98 50.00,66.04 74.69,83.98 65.26,54.96 89.94,37.02 59.43,37.02"
        fill="#ffffff" stroke="#111110" stroke-width="4" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous photo">&#8249;</button>
    <img id="lightboxImg" src="" alt="Self Indulgence Design archive photo, enlarged">
    <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next photo">&#8250;</button>
  </div>

  <script>
    /*
      ARCHIVE PHOTOS
      ----------------------------------------------------
      Replace this list with your real photos once you have them.
      Each entry needs a file path (put images in an "archive" folder
      next to this HTML file) and an aspect ratio class that controls
      the placeholder shape: "aspect-tall", "aspect-wide", or "aspect-square".

      Example once you have real files:
      { src: "archive/board-01.jpg", aspect: "aspect-tall" }

      Until then, this renders placeholder blocks so you can see the
      scrolling layout in action.
    */
    var PHOTOS = [
      { src: "archive/photo-01.jpg", aspect: "aspect-wide" },
      { src: "archive/photo-02.jpg", aspect: "aspect-tall" },
      { src: "archive/photo-03.jpg", aspect: "aspect-tall" },
      { src: "archive/photo-04.jpg", aspect: "aspect-wide" },
      { src: "archive/photo-05.jpg", aspect: "aspect-tall" },
      { src: "archive/photo-06.jpg", aspect: "aspect-tall" },
      { src: "archive/photo-07.jpg", aspect: "aspect-wide" },
      { src: "archive/photo-08.jpg", aspect: "aspect-wide" }
    ];

    (function(){
      var gallery = document.getElementById('gallery');
      var sentinel = document.getElementById('gallerySentinel');

      function appendBatch(){
        PHOTOS.forEach(function(photo, i){
          var figure = document.createElement('figure');

          if (photo.src){
            var img = document.createElement('img');
            img.src = photo.src;
            img.alt = 'Self Indulgence Design archive photo';
            img.loading = 'lazy';
            img.dataset.photoIndex = i; // index into PHOTOS, used by the lightbox
            img.addEventListener('click', function(){
              openLightbox(i);
            });
            figure.appendChild(img);
          } else {
            var div = document.createElement('div');
            div.className = 'placeholder-photo ' + photo.aspect;
            var span = document.createElement('span');
            span.textContent = 'Photo placeholder — add real images to the PHOTOS list';
            div.appendChild(span);
            figure.appendChild(div);
          }

          gallery.appendChild(figure);
        });
      }

      // load a couple of batches up front so there's room to scroll
      appendBatch();
      appendBatch();

      var observer = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          if (entry.isIntersecting){
            appendBatch();
          }
        });
      }, { rootMargin: '600px' });

      observer.observe(sentinel);

      // ---- lightbox ----
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = document.getElementById('lightboxImg');
      var currentIndex = 0;

      function openLightbox(index){
        currentIndex = index;
        lightboxImg.src = PHOTOS[currentIndex].src;
        lightbox.hidden = false;
      }

      function closeLightbox(){
        lightbox.hidden = true;
        lightboxImg.src = '';
      }

      function showPhoto(step){
        // loop through the PHOTOS list in either direction
        currentIndex = (currentIndex + step + PHOTOS.length) % PHOTOS.length;
        lightboxImg.src = PHOTOS[currentIndex].src;
      }

      document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
      document.getElementById('lightboxPrev').addEventListener('click', function(){ showPhoto(-1); });
      document.getElementById('lightboxNext').addEventListener('click', function(){ showPhoto(1); });

      lightbox.addEventListener('click', function(e){
        if (e.target === lightbox){ closeLightbox(); }
      });

      document.addEventListener('keydown', function(e){
        if (lightbox.hidden) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') showPhoto(-1);
        if (e.key === 'ArrowRight') showPhoto(1);
      });

      // ---- back to top ----
      var backToTop = document.getElementById('backToTop');

      window.addEventListener('scroll', function(){
        if (window.scrollY > 400){
          backToTop.classList.add('visible');
        } else {
          backToTop.classList.remove('visible');
        }
      });

      backToTop.addEventListener('click', function(){
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>

  <script>
    (function(){
      var video = document.getElementById('logoVideo');
      var canvas = document.getElementById('logoCanvas');
      var ctx = canvas.getContext('2d', { willReadFrequently: true });

      function drawFrame(){
        if (!video.paused && !video.ended){
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var data = frame.data;
          for (var i = 0; i < data.length; i += 4){
            var r = data[i], g = data[i+1], b = data[i+2];
            if (g > 85 && g > r * 1.3 && g > b * 1.3){
              data[i+3] = 0;
            }
          }
          ctx.putImageData(frame, 0, 0);
        }
        requestAnimationFrame(drawFrame);
      }

      video.play().catch(function(){});
      requestAnimationFrame(drawFrame);
    })();
  </script>
</body>
</html>
