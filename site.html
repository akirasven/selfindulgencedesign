<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Indulgence Design</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#ffffff;
    color:#6e1414;
    font-family: "Times New Roman", Times, Georgia, serif;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }

  /* ---- fixed header ---- */
  .site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px 0;
    background:#ffffff;
    z-index:10;
    border-bottom:1px solid #eee2e2;
  }

  .site-header img{
    height:56px;
    width:auto;
    display:block;
  }

  /* ---- main content, pushed down below the fixed header ---- */
  main{
    flex:1;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:100px 24px 24px; /* top padding clears the fixed header */
  }

  h1{
    font-size:clamp(28px, 5vw, 48px);
    font-weight:400;
    letter-spacing:0.06em;
    text-transform:uppercase;
    line-height:1.2;
  }
  p{
    margin-top:16px;
    font-size:14px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:#9a8080;
  }
</style>
</head>
<body>
  <header class="site-header">
    <img src="header-logo.gif" alt="Self Indulgence Design">
  </header>

  <main>
    <div>
      <h1>Self Indulgence Design</h1>
      <p>Website coming soon</p>
    </div>
  </main>
</body>
</html>
