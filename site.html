<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self Indulgence Design</title>
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="shortcut icon" href="favicon.ico">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    background:#ffffff;
    color:#6e1414;
    font-family: "Times New Roman", Times, Georgia, serif;
    cursor: url('cursor-star.png') 16 16, auto;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
  }

  /* ---- fixed header ---- */
  .site-header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 0 0;
    background:#ffffff;
    z-index:10;
    border-bottom:1px solid #eee2e2;
  }

  .site-header canvas{
    height:56px;
    width:auto;
    display:block;
  }

  @media (min-width: 768px){
    .site-header canvas{
      height:110px;
    }
    main{
      padding-top:210px;
      align-items:center;
    }
  }

  .logo-link{
    display:block;
    line-height:0;
    text-decoration:none;
  }

  .visually-hidden-video{
    position:absolute;
    width:1px;
    height:1px;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
  }

  .site-nav{
    width:100%;
    max-width:520px;
    display:flex;
    justify-content:space-evenly;
    padding:10px 24px;
  }

  .site-nav a{
    color:#6e1414;
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:15px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    text-decoration:none;
    transition:opacity 0.3s ease;
  }

  .site-nav a:hover,
  .site-nav a:focus-visible{
    opacity:0.6;
  }

  /* ---- main content, pushed down below the fixed header ---- */
  main{
    flex:1;
    width:100%;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    text-align:center;
    padding:120px 24px 24px; /* top padding clears the fixed header + nav */
  }

  h1{
    font-size:clamp(28px, 5vw, 48px);
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    line-height:1.2;
  }
  p{
    margin-top:16px;
    font-size:20px;
    font-style:italic;
    font-weight:700;
    letter-spacing:0.04em;
    color:#6e1414;
  }

  .yt-frame{
    margin:32px auto 0;
    width:min(92vw, 720px);
    aspect-ratio:16/9;
  }

  .yt-frame iframe{
    width:100%;
    height:100%;
    border:0;
  }
</style>
</head>
<body>
  <header class="site-header">
    <video id="logoVideo" class="visually-hidden-video" muted loop autoplay playsinline>
      <source src="header-logo-chroma.mp4" type="video/mp4">
    </video>
    <a href="site.html" class="logo-link" aria-label="Return to home page">
      <canvas id="logoCanvas" width="162" height="120"></canvas>
    </a>
    <nav class="site-nav">
      <a href="models.html">Models</a>
      <a href="videos.html">Videos</a>
      <a href="archive.html">Archive</a>
      <a href="order.html">Order</a>
    </nav>
  </header>

  <main>
    <div>
      <h1>Self Indulgence Design</h1>
      <p>Pretty On The Inside</p>
      <div class="yt-frame">
        <iframe
          src="https://www.youtube-nocookie.com/embed/IZ3QvrsQHTo"
          title="Self Indulgence Design"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </main>

  <script>
    (function(){
      var video = document.getElementById('logoVideo');
      var canvas = document.getElementById('logoCanvas');
      var ctx = canvas.getContext('2d', { willReadFrequently: true });

      function drawFrame(){
        if (!video.paused && !video.ended){
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var data = frame.data;
          for (var i = 0; i < data.length; i += 4){
            var r = data[i], g = data[i+1], b = data[i+2];
            // key out the green background, keep everything else opaque
            if (g > 85 && g > r * 1.3 && g > b * 1.3){
              data[i+3] = 0;
            }
          }
          ctx.putImageData(frame, 0, 0);
        }
        requestAnimationFrame(drawFrame);
      }

      video.play().catch(function(){});
      requestAnimationFrame(drawFrame);
    })();
  </script>
</body>
</html>
